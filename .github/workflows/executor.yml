name: testnet-executor
# DISABLED BY DEFAULT. To activate:
#  1. Settings -> Secrets and variables -> Actions -> Secrets: add DELTA_API_KEY, DELTA_API_SECRET
#  2. Same page -> Variables tab: add EXECUTOR_ENABLED = true
on:
  schedule:
    - cron: "*/15 12-18 * * *"     # every 15 min, 17:30-23:30 IST
  workflow_dispatch:
concurrency:
  group: executor
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  run:
    if: ${{ vars.EXECUTOR_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python executor.py
        working-directory: ai
        env:
          BOT_MODE: testnet
          DELTA_API_KEY: ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET: ${{ secrets.DELTA_API_SECRET }}
      - name: commit state
        run: |
          git config user.name "executor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add ai/executor_state.json
          git commit -m "executor state" || echo "no changes"
          git pull --rebase || true
          git push
